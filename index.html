<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해바라기 소개 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #ff8fcf, #73c7ff);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .drop {
      position: absolute;
      top: -120px;
      width: 2px;
      height: 70px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.75));
      border-radius: 999px;
      animation: fall linear infinite;
      opacity: 0.75;
    }

    @keyframes fall {
      0% {
        transform: translateY(-120px);
      }
      100% {
        transform: translateY(120vh);
      }
    }

    .profile-card {
      position: relative;
      z-index: 2;
      width: min(90%, 620px);
      padding: 60px 42px;
      text-align: center;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(14px);
    }

    .emoji {
      font-size: 72px;
      margin-bottom: 18px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      margin-bottom: 18px;
      letter-spacing: -0.04em;
      text-shadow: 0 6px 24px rgba(0, 0, 0, 0.22);
    }

    p {
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      line-height: 1.7;
      word-break: keep-all;
      opacity: 0.95;
    }

    .music-note {
      margin-top: 32px;
      font-size: 0.95rem;
      opacity: 0.82;
    }

    .glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      filter: blur(70px);
      z-index: 0;
      animation: glowMove 8s ease-in-out infinite alternate;
    }

    .glow.one {
      top: -120px;
      left: -100px;
    }

    .glow.two {
      right: -120px;
      bottom: -130px;
      animation-delay: 1.5s;
    }

    @keyframes glowMove {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(40px, 30px) scale(1.12);
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <div class="rain" aria-hidden="true">
    <span class="drop" style="left: 4%; animation-duration: 1.1s; animation-delay: 0s;"></span>
    <span class="drop" style="left: 10%; animation-duration: 1.4s; animation-delay: 0.3s;"></span>
    <span class="drop" style="left: 16%; animation-duration: 1.2s; animation-delay: 0.7s;"></span>
    <span class="drop" style="left: 23%; animation-duration: 1.6s; animation-delay: 0.2s;"></span>
    <span class="drop" style="left: 31%; animation-duration: 1.25s; animation-delay: 0.5s;"></span>
    <span class="drop" style="left: 39%; animation-duration: 1.5s; animation-delay: 0.1s;"></span>
    <span class="drop" style="left: 47%; animation-duration: 1.15s; animation-delay: 0.8s;"></span>
    <span class="drop" style="left: 55%; animation-duration: 1.7s; animation-delay: 0.4s;"></span>
    <span class="drop" style="left: 63%; animation-duration: 1.3s; animation-delay: 0.6s;"></span>
    <span class="drop" style="left: 71%; animation-duration: 1.55s; animation-delay: 0.2s;"></span>
    <span class="drop" style="left: 79%; animation-duration: 1.2s; animation-delay: 0.9s;"></span>
    <span class="drop" style="left: 87%; animation-duration: 1.45s; animation-delay: 0.3s;"></span>
    <span class="drop" style="left: 94%; animation-duration: 1.1s; animation-delay: 0.7s;"></span>
  </div>

  <main class="profile-card">
    <div class="emoji">🌻</div>
    <h1>안녕하세요, 해바라기입니다.</h1>
    <p>
      저는 여러분과 함께 즐겁고 행복한 교실 수업을 만들어 갈<br />
      다정하고 따뜻한 선생님입니다.<br /><br />
      여러분 한 사람 한 사람이 가진 빛을 소중히 바라보고,<br />
      서로 존중하며 함께 성장하는 시간을 만들어 가고 싶습니다.<br /><br />
      때로는 웃으며 배우고, 때로는 진지하게 생각을 나누며<br />
      우리 교실이 편안하고 따뜻한 배움의 공간이 되기를 바랍니다.
    </p>
    <div class="music-note">배경 음악: bg.mp3</div>
  </main>

  <audio src="bg.mp3" autoplay loop controls></audio>

  <script>
    const audio = document.querySelector("audio");
    audio.volume = 0.45;
  </script>
</body>
</html>
